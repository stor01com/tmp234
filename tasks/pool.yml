---
- name: Create a replicated pool
  ceph.automation.ceph_pool:
    name: "replikowana"
    state: present
    size: 3
    application: rbd
    pool_type: replicated
    pg_autoscale_mode: off
    rule_name: pula_replikowana

- name: Create an EC pool
  ceph.automation.ceph_pool:
    name: pula_ec
    state: present
    erasure_profile: cold-stor-profile
    application: rgw
    pool_type: erasure
    pg_autoscale_mode: off
    pg_num: 16
    pgp_num: 16
