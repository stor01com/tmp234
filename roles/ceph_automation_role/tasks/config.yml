---
# - name: Set cluster configuration options
#   ansible.builtin.debug:
#     msg: "{{ item.key }}: {{ item.name }} {{ item.value }}"
#   loop: "{{ opi_cluster_config | dict2items }}"

- name: Wyświetl klucze i wartości z pod-słowników
    debug:
      msg: "Sekcja: {{ parent.key }}, Klucz: {{ item.key }}, Wartość: {{ item.value }}"
    loop: "{{ parent.value | dict2items }}"
    loop_control:
      loop_var: item
    with_items: "{{ opi_ceph_config | dict2items }}"
    loop_control:
      loop_var: parent
